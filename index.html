<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Periodizacao Upper/Lower</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <h1>
      <img src="src/dumbbell.png" /> Periodizacao Upper/Lower - Marlon Prado
    </h1>

    <div class="tabs">
      <button class="tab active" onclick="selectTreino(0)">Treino A</button>
      <button class="tab" onclick="selectTreino(1)">Treino B</button>
      <button class="tab" onclick="selectTreino(2)">Descanço</button>
      <button class="tab" onclick="selectTreino(3)">Treino A</button>
      <button class="tab" onclick="selectTreino(4)">Treino B</button>
    </div>

    <div id="treinos"></div>

    <div class="timer" id="timer">
      <button class="timer-toggle" onclick="toggleTimer()">⏱️ ►</button>
      <p><span id="tempo">00:00</span></p>
      <div class="timer-buttons">
        <button onclick="startPauseTimer()">Iniciar</button>
        <button onclick="resetTimer()">Zerar</button>
      </div>
    </div>

    <script>
      const ficha = [
        {
          titulo: "Treino A 1 ",
          exercicios: [
            `⚪ Abdominal Supra na prancha

              Séries: 3x RM (máximo de repetições possíveis)
              ⏱️  45 seg `,

            `⚪ Supino Inclinado

             Progressão de carga 
             Séries: *(1x 15–20) *(1x 10–15) 
             *(2x 8–12) 
             *(1x 6–8)
             ⏱️  1-2 min entre as séries`,

            `⚪ Supino Reto 

            Progressão de carga 
             Séries: *(1x10–15) *(1x8–12) 
             *(2x 6–10)
             ⏱️ 1–2 min `,

            `⚪ Remada curvada pronada

            Progressão de carga
              Séries: 1x 15-20, 1x 10-15 
              1x 8-12, 1x 6-10
              ⏱️  2–3 min`,

            `⚪ Pulley Triângulo

            Contração de pico
             Séries: *(3x 8-12)
             ⏱️ 45 seg `,

            `⚪Elevação Lateral Sentado

            Repetições parciais após a falha
            Séries: 4x 8-12
             ⏱️ 45 seg`,

            `⚪ Desenvolvimento

             Séries: *(1x 10-15)*(1x 8-12)
             *(2x 6-10 )
             ⏱️ 60 seg `,

            `⚪ Rosca direta cabo

            Progressão de carga e Drop
             Séries: *(1x 10-15)*(1x 8-12)
             *(1x 6-10 + 2 Drop)
             ⏱️ 1 min `,

            `⚪ Scott máquina
            
             Séries: *(3x 8-12) 
             ⏱️ 1 min `,

            `⚪ Bíceps  no banco 45° com Halter
            
             Séries: *(3x 8-12) 
             ⏱️ 1 min `,

            `⚪ Tríceps frances no cabo
            
             Séries: *(3x 8-12) 
             ⏱️ 1 min `,

            `⚪ Tríceps Testa
            
             Séries: *(3x 8-12) 
             ⏱️ 1 min `,
          ],
        },
        {
          titulo: "Treino B 1 ",
          exercicios: [
            `⚪ Lombar no banco romano

              Séries: 3x RM (máximo de repetições possíveis)
              ⏱️ 45 seg `,

            `⚪ Panturrilha em pé

            Progressão de carga
              Séries: 1x 15-20, 1x 10-15 
              1x 8-12, 1x 6-10
              ⏱️  1–2 min
               `,

            `⚪ Panturrilha sentada

             Progressão de carga e Pico de contração de 2 seg 
             Séries: 1x 10–15   1x 8–12   1x 6–10
             ⏱️  1 min`,

            `⚪ Cadeira extenssora

            Progressão de carga, Pico de contração de 2 seg e Drop
              Séries: 2x 15–20 ⏱️ 30 seg *Pc 2 seg
              2x 10-15
              1x 8-12 + 2 Drop
              ⏱️ 1 min`,

            `⚪ Agachamento Livre/Smith

            Progressão de carga
              Séries: 1x 10-15, 1x 10–12, 
              1x 6–10
              ⏱️ 2-3 min
              `,

            `⚪ Leg 45°

              10 parciais apos a falha
              Séries: 3x 10-12
              ⏱️ 2-3 min
              `,

            `⚪ Cadeira Flexora

              Pico de contração de 2 seg
              Séries: 4x 8-12
              ⏱️ 60 seg
              `,
            `⚪ Flexora em pé

              Séries: 3x 8–12
              ⏱️ 45 seg`,

            `⚪ Elevaçao Pelvica

              Séries: 3x 8–12
              ⏱️ 60 seg`,
          ],
        },
        {
          titulo: " Descanço ",
        },
        {
          titulo: "Treino A 2",
          exercicios: [
            `⚪ Voador

            Progressão de carga e Drop
            Séries: 1x 15-20, 1x 10-15,
            1x 8-12, 1x 6-10 + 2 Drop
            ⏱️ 1 min
             `,

            `⚪ Supino Declinado

            Progressão de carga
            Séries: 1x 15-20, 1x 10-15, 1x 8-12, 
            1x 6-10 
            ⏱️ 2 min
            `,

            `⚪ Serrote

            Progressão de carga 
            Séries: 1x 15-20, 1x 10-15, 
            1x 8-12
            1x 6-10 
            ⏱️ 2-3 min
             `,

            `⚪  Pulley frente aberto

            Progressão de carga e Pico de contração de 2 seg
            Séries: 1x 10-15, 1x 8-12, 
            1x 6-10 
            ⏱️ 1 min
             `,

            `⚪ Elevação Frontal corda na polia

           Progressão de carga e Drop
            Séries: 1x 10-15, 1x 8-12, 
            1x 6-10 + 2 Drop
            ⏱️ 1 min
             `,

            `⚪  Crucifixo invertido/Voador Inverso
          
            Series: 4x 8-12
            ⏱️ 1 min
             `,

            `⚪ Tríceps frances no cabo

            Progressão de carga e Drop
            Séries: 3x 8-12
            ⏱️ 45 seg
              `,

            `⚪ Tríceps Testa
            
             Séries: *(3x 8-12) 
             ⏱️ 1 min `,

            `⚪ Tríceps corda
            
             Séries: *(3x 8-12) 
             ⏱️ 1 min `,

            ` ⚪ Bíceps corda

            Progressão de carga e Drop
            Séries: 3x 8-12
            ⏱️ 45 seg
              `,

            `⚪  Scott máquina
            
             Séries: *(3x 8-12) 
             ⏱️ 1 min `,
          ],
        },
        {
          titulo: "Treino B 2",
          exercicios: [
            ` ⚪ Abdominal infra na torre

            Séries: 3x RM (máximo de repetições possíveis)
            ⏱️  45 seg `,

            `⚪ Panturrilha em pé

            Progressão de carga
              Séries: 1x 15-20, 1x 10-15 
              1x 8-12, 1x 6-10
              ⏱️  1–2 min
               `,

            `⚪ Panturrilha sentada

             Progressão de carga e Pico de contração de 2 seg 
             Séries: 1x 10–15   1x 8–12   1x 6–10
             ⏱️  1 min`,

            `⚪ Cadeira Flexora

              Pico de contração de 2 seg
              Séries: 4x 8-12
              ⏱️ 60 seg
              `,
            `⚪ Flexora em pé

              Séries: 3x 8–12
              ⏱️ 45 seg`,

            `⚪ Cadeira extenssora

            Progressão de carga, Pico de contração de 2 seg e Drop
              Séries: 2x 15–20 ⏱️ 30 seg *Pc 2 seg
              2x 10-15
              1x 8-12 + 2 Drop
              ⏱️ 1 min`,

            `⚪ Agachamento Livre/Smith

            Progressão de carga
              Séries: 1x 10-15, 1x 10–12, 
              1x 6–10
              ⏱️ 2-3 min
              `,

            `⚪ Abdutora

              Séries: 4x 8–12
              ⏱️ 60 seg`,
          ],
        },
      ];

      const treinosEl = document.getElementById("treinos");
      let diaAtual = 0;
      let timerInterval = null;
      let isTimerRunning = false;
      let tempoTotal = 0;

      function renderTreinos() {
        treinosEl.innerHTML = "";
        ficha.forEach((dia, index) => {
          const card = document.createElement("div");
          card.className = "card" + (index === diaAtual ? " active" : "");
          const titulo = document.createElement("h2");
          titulo.innerText = dia.titulo;
          const ul = document.createElement("ul");
          dia.exercicios.forEach((ex, idx) => {
            const li = document.createElement("li");
            li.innerText = ex;
            li.onclick = () => {
              li.classList.toggle("feito");
              salvarEstado();
            };
            if (estaFeito(dia.titulo, idx)) li.classList.add("feito");
            ul.appendChild(li);
          });
          card.appendChild(titulo);
          card.appendChild(ul);
          treinosEl.appendChild(card);
        });

        // Atualizar estado das abas
        document.querySelectorAll(".tab").forEach((tab, index) => {
          tab.classList.toggle("active", index === diaAtual);
        });
      }

      function selectTreino(index) {
        diaAtual = index;
        renderTreinos();
      }

      function salvarEstado() {
        const data = {};
        document.querySelectorAll(".card").forEach((card, diaIndex) => {
          const key = ficha[diaIndex].titulo;
          data[key] = [];
          card.querySelectorAll("li").forEach((li, i) => {
            data[key][i] = li.classList.contains("feito");
          });
        });
        localStorage.setItem("progressoTreino", JSON.stringify(data));
      }

      function estaFeito(titulo, index) {
        const data = JSON.parse(localStorage.getItem("progressoTreino")) || {};
        return data[titulo]?.[index];
      }

      function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins.toString().padStart(2, "0")}:${secs
          .toString()
          .padStart(2, "0")}`;
      }

      function startPauseTimer() {
        const button = document.querySelector(
          'button[onclick="startPauseTimer()"]'
        );
        if (isTimerRunning) {
          clearInterval(timerInterval);
          isTimerRunning = false;
          button.textContent = "Iniciar";
        } else {
          isTimerRunning = true;
          button.textContent = "Pausar";
          timerInterval = setInterval(() => {
            tempoTotal++;
            document.getElementById("tempo").textContent =
              formatTime(tempoTotal);
          }, 1000);
        }
      }

      function resetTimer() {
        clearInterval(timerInterval);
        isTimerRunning = false;
        tempoTotal = 0;
        document.getElementById("tempo").textContent = formatTime(tempoTotal);
        document.querySelector(
          'button[onclick="startPauseTimer()"]'
        ).textContent = "Iniciar";
      }

      function toggleTimer() {
        const timer = document.getElementById("timer");
        timer.classList.toggle("retraido");
        const toggleButton = timer.querySelector(".timer-toggle");
        toggleButton.textContent = timer.classList.contains("retraido")
          ? "⏱️◄"
          : "⏱️►";
      }

      renderTreinos();
    </script>
  </body>
</html>
