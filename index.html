<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Periodizacao PPL+Upper/Lower</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <h1>
      <img src="src/dumbbell.png" /> Periodizacao PPL+Upper/Lower - Marlon Prado
    </h1>

    <div class="tabs">
      <button class="tab active" onclick="selectTreino(0)">Treino PUSH</button>
      <button class="tab" onclick="selectTreino(1)">Treino PULL</button>
      <button class="tab" onclick="selectTreino(2)">Treino LEGS</button>
      <button class="tab" onclick="selectTreino(3)">Descanso</button>
      <button class="tab" onclick="selectTreino(4)">Treino Upper</button>
      <button class="tab" onclick="selectTreino(5)">Treino Lower</button>
    </div>

    <div id="treinos"></div>

    <div class="timer" id="timer">
      <button class="timer-toggle" onclick="toggleTimer()">⏱️ ►</button>
      <p><span id="tempo">00:00</span></p>
      <div class="timer-buttons">
        <button onclick="startPauseTimer()">Iniciar</button>
        <button onclick="resetTimer()">Zerar</button>
      </div>
    </div>

    <script>
      const ficha = [
        {
          titulo: "🔴DIA 1 – PUSH (peito,ombro,tríceps)🏋️‍♂️",
          descricao: "🎯 Foco: força + hipertrofia",
          exercicios: [
            `⚪ Prancha

              Séries: 2x
              ⏱️  1 min `,

            `⚪ Supino Inclinado
 
             Séries: 4x 8-10
             Progressão de carga 
             ⏱️  1- 1:30 min entre as séries`,

            `⚪ Supino Reto 
 
             Séries: 3x 8-10
             ⏱️ 1–2 min `,

            `⚪ Crucifixo máquina 
            
              Séries: 3x10-12 (controlado)
              Contração de pico
              ⏱️ 1 min`,

            `⚪ Desenvolvimento halter

             Séries: 3x 6-8
             ⏱️ 1 min `,

            `⚪Elevação Lateral Sentado

            Séries: 4x 12-15
            Última - drop set
             ⏱️ 1 min`,

            `⚪ Tríceps testa

             Séries: 3x 8-10
             ⏱️ 1 min `,

            `⚪ Tríceps corda

             Séries: 3x 10-12
             Progressão de carga e Drop
             ⏱️ 1 min `,

            `⚪ Tríceps frances no cabo
            
             Séries: 3x 8-12
             ⏱️ 1 min `,
          ],
        },
        {
          titulo: "🔵 DIA 2 – PULL (costas, bíceps) 🧲 ",
          descricao: "🎯Foco: densidade de costas + conexão mente-músculo",
          exercicios: [
            `⚪ Lombar no banco romano

              Séries: 3x RM (máximo de repetições possíveis)
              ⏱️ 45 seg `,

            `⚪ Barra fixa (ou puxada)

              Séries: 4x 8-12
              Progressão de carga + pico de contração 2 seg+Drop
              ⏱️  1–2 min
               `,

            `⚪ Remada curvada
 
             Séries: 1x 10–15   1x 8–12   1x 6–10
             Progressão de carga e Pico de contração 2 seg
             ⏱️  1-2 min`,

            `⚪ Remada baixa

              Séries: 3x 8-10
              Progressão de carga + Pico de contração 2 seg
              ⏱️ 1 min`,

            `⚪ Face pull

              Séries: 3x 12-15
              ⏱️ 1 min
              `,

            `⚪ Rosca no Banco Inclinado 45º

              Séries: 3x 10–12
              Pico de contração 2 seg
              ⏱️ 1 min`,

            `⚪ Rosca Scott

              Séries: 3x 10-12
              Drop set
              ⏱️ 1 min
              `,

            `⚪ Rosca alternada + Rosca martelo

              Pico de contração de 2 seg
              Séries: 3x 8-12
              ⏱️ 1 min`,
          ],
        },
        {
          titulo: " 🟢 DIA 3 – LEGS (pernas) 🦵 ",
          descricao: "🎯 Foco: base pesada",
          exercicios: [
            ` ⚪ Abdominal infra na torre

            Séries: 3x RM (máximo de repetições possíveis)
            ⏱️  45 seg `,

            ` ⚪ Cadeira extensora

            Séries: 2x 12-15 2x 10-12
            Drop na última
            ⏱️  30seg - 1 min `,

            ` ⚪ Agachamento livre

            Séries: 4x 5-8
            ⏱️  2- 3:30 min `,

            ` ⚪ Leg press

            Séries: 3x 8-10
            ⏱️  2- 3:30 min `,

            ` ⚪ Stiff||Terra

            Séries: 3x 8-10
            ⏱️  1- 2:30 min`,

            ` ⚪ Cadeira flexora

            Séries: 3x 10-12
            ⏱️  1-2 min `,

            ` ⚪ Panturrilha em pé

            Séries: 6x 20-15-10-10-15-20 (pirâmide)
            2s descendo + 2s parado embaixo + subida forte
            ⏱️  1 min `,
            
          ],
        },
        {
          titulo: "⚫ DIA 4 – ⏱️ Descanso",
          descricao: "👉 Aqui entra o diferencial💡",
          exercicios: [
            `⚪ Mobilidade de quadril e ombro `,
            `⚪ Abdômen leve (opcional) `,
            `⚪ Cardio HIT na esteira 

            Caminhada rápida 3 a 5 min Vel. 5.8 - 6.5 km/h
            10 tiros de 30 seg correndo alternado com 10 tiros de 30 seg descansando

            ⏱️10-15 min `,
          ],
        },
        {
          titulo: "🟡 DIA 5 – UPPER (superior) ",
          descricao: "🎯Foco: Volume + Controle na fase excêntrica (2–3s)",
          exercicios: [
            
            `⚪ Crucifixo/Voador máquina

              Séries: 3x 8–12
              ⏱️ 1 min`,

            ` ⚪ Supino inclinado

            Séries: 3x 8-10
            ⏱️  1 min `,

            `⚪ Puxada aberta frente

              Séries: 3x 8-12
              ⏱️  1–2 min`,

            `⚪ Remada unilateral
 
             Séries: 3x 10-12
             Pico de contração de 2 seg
             ⏱️  1 min`,

            `⚪ Desenvolvimento máquina/halter

              Séries: 2x 10
              ⏱️ 1 min`,
            `⚪ Elevação lateral no cabo

              Séries: 3x 12-15
              Pico de contração de 2 seg
              ⏱️ 1 min`,

            `⚪ Rosca direta

              Séries: 2x 10-12
              Pico de contração de 2 seg 
              ⏱️ 1 min`,

              `⚪ Rosca martelo

              Séries: 2x 10-12
              ⏱️ 1 min`,

            `⚪ Tríceps Pulley

              Séries: 2x 10-12
              ⏱️ 1 min`,
          ],
        },
        {
          titulo: "🟣 DIA 6 – LOWER (inferior)",
          descricao: "🎯Foco: Posterior + Glúteo",
          exercicios: [
            ` ⚪ Abdominal infra na torre

            Séries: 3x RM (máximo de repetições possíveis)
            ⏱️  45 seg `,

            `⚪ Terra ou stiff

              Séries: 4x5-8
              Progressão de carga
              ⏱️  1–2 min`,

            `⚪ Mesa flexora

             Séries: 3x 10-12
             ⏱️  1 min`,

            `⚪ Afundo

              Séries: 3x 10
              ⏱️  1 min `,
              
            `⚪ Cadeira extensora

              Séries: 4x 8–12
              ⏱️ 1 min`,

            `⚪ Elevação Pélvica

             Séries: 3x 8-10
             Pico de contração de 2 seg
             ⏱️ 1 min`,
              
            `⚪ Abdutora

              Séries: 3x 8–12
              ⏱️ 1 min`,

            `⚪ Panturrilha sentado + Panturrilha em pé

            Progressão de carga
              Séries: 4x 12-15
              ⏱️ 1-2 min
              `,

          ],
        },
      ];

      const treinosEl = document.getElementById("treinos");
      let diaAtual = 0;
      let timerInterval = null;
      let isTimerRunning = false;
      let tempoTotal = 0;

      function renderTreinos() {
        treinosEl.innerHTML = "";
        ficha.forEach((dia, index) => {
          const card = document.createElement("div");
          card.className = "card" + (index === diaAtual ? " active" : "");
          const titulo = document.createElement("h2");
          titulo.innerText = dia.titulo;
          const descricao = document.createElement("p");
          descricao.innerText = dia.descricao || "";
          const ul = document.createElement("ul");
          dia.exercicios.forEach((ex, idx) => {
            const li = document.createElement("li");
            li.innerText = ex;
            li.onclick = () => {
              li.classList.toggle("feito");
              salvarEstado();
            };
            if (estaFeito(dia.titulo, idx)) li.classList.add("feito");
            ul.appendChild(li);
          });
          card.appendChild(titulo);
          card.appendChild(descricao);
          card.appendChild(ul);
          treinosEl.appendChild(card);
        });

        // Atualizar estado das abas
        document.querySelectorAll(".tab").forEach((tab, index) => {
          tab.classList.toggle("active", index === diaAtual);
        });
      }

      function selectTreino(index) {
        diaAtual = index;
        renderTreinos();
      }

      function salvarEstado() {
        const data = {};
        document.querySelectorAll(".card").forEach((card, diaIndex) => {
          const key = ficha[diaIndex].titulo;
          data[key] = [];
          card.querySelectorAll("li").forEach((li, i) => {
            data[key][i] = li.classList.contains("feito");
          });
        });
        localStorage.setItem("progressoTreino", JSON.stringify(data));
      }

      function estaFeito(titulo, index) {
        const data = JSON.parse(localStorage.getItem("progressoTreino")) || {};
        return data[titulo]?.[index];
      }

      function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins.toString().padStart(2, "0")}:${secs
          .toString()
          .padStart(2, "0")}`;
      }

      function startPauseTimer() {
        const button = document.querySelector(
          'button[onclick="startPauseTimer()"]',
        );
        if (isTimerRunning) {
          clearInterval(timerInterval);
          isTimerRunning = false;
          button.textContent = "Iniciar";
        } else {
          isTimerRunning = true;
          button.textContent = "Pausar";
          timerInterval = setInterval(() => {
            tempoTotal++;
            document.getElementById("tempo").textContent =
              formatTime(tempoTotal);
          }, 1000);
        }
      }

      function resetTimer() {
        clearInterval(timerInterval);
        isTimerRunning = false;
        tempoTotal = 0;
        document.getElementById("tempo").textContent = formatTime(tempoTotal);
        document.querySelector(
          'button[onclick="startPauseTimer()"]',
        ).textContent = "Iniciar";
      }

      function toggleTimer() {
        const timer = document.getElementById("timer");
        timer.classList.toggle("retraido");
        const toggleButton = timer.querySelector(".timer-toggle");
        toggleButton.textContent = timer.classList.contains("retraido")
          ? "⏱️◄"
          : "⏱️►";
      }

      renderTreinos();
    </script>
  </body>
</html>
